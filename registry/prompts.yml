prompts:
  - id: review
    version: v1
    summary: Review a diff or branch for bugs, regressions, and missing tests.
    path: prompts/review/v1.md
    placeholders:
      - repo_name
      - task_context
      - constraints
      - verification
  - id: feature
    version: v1
    summary: Implement a scoped feature with explicit contracts and verification.
    path: prompts/feature/v1.md
    placeholders:
      - repo_name
      - task_context
      - constraints
      - verification
  - id: bugfix
    version: v1
